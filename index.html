// RENDER: antingen scroll-stack (N lektionskort) eller enkort-stage
// =============================
function renderCourseCardStack(){
  if(!currentCourseCards || currentCourseCards.length === 0) return;
  app.innerHTML = "";
  const stack = document.createElement("div");
  stack.className = "courseCardStack" + (currentBlockAccent ? " accent-" + currentBlockAccent : "");
  currentCourseCards.forEach((card, i) => {
    const wrap = document.createElement("div");
    wrap.className = "scrollCardItem";
    wrap.appendChild(buildMainCardEl(card));
    stack.appendChild(wrap);
  });
  app.appendChild(stack);
  const pageHeight = () => {
    const first = stack.querySelector(".scrollCardItem");
    return first ? first.offsetHeight : stack.clientHeight;
  };
  stack.addEventListener("scroll", () => {
    const h = pageHeight();
    if(h <= 0) return;
    const newIndex = Math.min(currentCourseCards.length - 1, Math.max(0, Math.round(stack.scrollTop / h)));
    if(newIndex !== currentIndex){
      currentIndex = newIndex;
      updatePanelContent();
    }
  }, { passive: true });
  function scrollToCurrentCard(){
    const h = pageHeight();
    if(h > 0) stack.scrollTop = currentIndex * h;
  }
  requestAnimationFrame(() => {
    scrollToCurrentCard();
    updatePanelContent();
    requestAnimationFrame(scrollToCurrentCard);
  });
}

function renderMainCard(){
  const deck = currentCourseCards || CARDS;
  if(!deck.length) return;
  const card = deck[currentIndex];

  if(!card.title || !card.title.trim()){
    console.warn("Card missing title:", card.id);
    app.innerHTML = "";
    updatePanelContent();
    return;
  }

  app.innerHTML = "";
  if(courseLayer) courseLayer.classList.remove("courseCardStackMode");

  const stage = document.createElement("div");
  stage.className = "cardStage" + (currentBlockAccent ? " accent-" + currentBlockAccent : "");
  stage.appendChild(buildMainCardEl(card));

  app.appendChild(stage);
  updatePanelContent();
  requestAnimationFrame(fitMainCardToViewport);
}

// =============================
// NAVIGATION (real slide up/down)
// =============================
function animateToIndex(newIndex, dir /* "next" | "prev" */){
  const deck = currentCourseCards || CARDS;
  if(isAnimating) return;
  if(newIndex < 0 || newIndex >= deck.length) return;
  if(newIndex === currentIndex) return;
  if(activePanel !== null) return;

  const stage = app.querySelector(".cardStage");
  if(!stage){
    currentIndex = newIndex;
    renderMainCard();
    return;
  }

  isAnimating = true;
  stage.classList.add("isAnimatingTransform");

  const outgoing = stage.querySelector(".mainCard");
  const incomingCard = deck[newIndex];
  const incoming = buildMainCardEl(incomingCard);
  outgoing.classList.add("isAnimatingTransform");
  incoming.classList.add("isAnimatingTransform");

  incoming.classList.add("isIncoming", "animating");

  // Incoming start position
  if(dir === "next") incoming.classList.add("slideFromDown");
  else incoming.classList.add("slideFromUp");

  // Outgoing will animate out
  outgoing.classList.add("animating");

  stage.appendChild(incoming);

  // Force layout so initial transforms apply
  incoming.getBoundingClientRect();

  // Animate
  requestAnimationFrame(() => {
    // incoming goes to neutral
    incoming.classList.remove("slideFromDown", "slideFromUp");
    // outgoing leaves
    if(dir === "next") outgoing.classList.add("slideToUp");
    else outgoing.classList.add("slideToDown");
  });

  const done = () => {
    incoming.removeEventListener("transitionend", done);

    // Commit state
    currentIndex = newIndex;

    // Clean stage: keep only incoming as normal positioned card
    stage.innerHTML = "";
    incoming.classList.remove(
      "isIncoming",
      "animating",
      "isAnimatingTransform",
      "slideToUp",
      "slideToDown",
      "slideFromDown",
      "slideFromUp"
    );
    // Make it relative again
    incoming.style.position = "relative";
    incoming.style.inset = "auto";
    stage.appendChild(incoming);

    updatePanelContent();
    requestAnimationFrame(fitMainCardToViewport);
    stage.classList.remove("isAnimatingTransform");

    // unlock after a tiny buffer
    setTimeout(() => { isAnimating = false; }, 40);
  };

  incoming.addEventListener("transitionend", done, { once: true });
}

// =============================
// RENDER PANEL CONTENT
// =============================
function updatePanelContent(){
  const deck = currentCourseCards || CARDS;
  if(!deck.length) return;
  const card = deck[currentIndex];
  const safeTitle = (card.title && card.title.trim()) ? card.title.trim() : null;

  if(!safeTitle){
    console.warn("Panel requested but card missing title:", card && card.id);
    exerciseContent.innerHTML = "";
    deepDiveContent.innerHTML = "";
    exerciseHeaderTitle.textContent = "Exercise";
    deepDiveHeaderTitle.textContent = APP_DEEP_DIVE_LABEL;
    return;
  }

  exerciseHeaderTitle.textContent = `Exercise · ${safeTitle}`;
  deepDiveHeaderTitle.textContent = APP_DEEP_DIVE_LABEL;

  const panelData = PANEL_BY_ID[card.id];
  if(!panelData){
    exerciseContent.innerHTML = "";
    deepDiveContent.innerHTML = "";
    return;
  }

  // EXERCISE
  const exercise = panelData.exercise;
  let exerciseHTML = "";

  if(exercise && exercise.sections && exercise.sections.length > 0){
    const note = exercise.reflection || "Tap outside to close. Panel should feel like a side-surface, not a modal.";
    const sectionsHTML = exercise.sections.map(s => `<div class="longformSection"><h3>${s.h}</h3><p>${s.p}</p></div>`).join("");
    const imageHTML = exercise.kind === "imageText" && exercise.imageSrc ? `<div class="exerciseImage"><img loading="lazy" decoding="async" src="${exercise.imageSrc}" alt="Exercise" /></div>` : "";
    exerciseHTML = `
      <div class="longformHeader">
        <div class="eyebrow">${card.eyebrow}</div>
        <div class="panelH1">${safeTitle}</div>
        <div style="margin-top:8px; font-size:14px; color:rgba(255,255,255,0.60)">Exercise · scroll inside panel</div>
      </div>
      <div class="longformScroll">
        ${imageHTML}
        ${sectionsHTML}
        <div class="panelNote">${note}</div>
      </div>
    `;
  } else if(exercise && exercise.bullets && exercise.bullets.length > 0){
    const note = exercise.reflection || "Tap outside to close. Panel should feel like a side-surface, not a modal.";
    const bulletsHTML = exercise.bullets.map(b => `<li>${b}</li>`).join("");
    const imageHTML = exercise.kind === "imageText" && exercise.imageSrc ? `<div class="exerciseImage"><img loading="lazy" decoding="async" src="${exercise.imageSrc}" alt="Exercise" /></div>` : "";
    exerciseHTML = `
      <div class="longformHeader">
        <div class="eyebrow">${card.eyebrow}</div>
        <div class="panelH1">${exercise.title || safeTitle}</div>
        <div style="margin-top:8px; font-size:14px; color:rgba(255,255,255,0.60)">Exercise · scroll inside panel</div>
      </div>
      <div class="longformScroll">
        ${imageHTML}
        <div class="longformSection"><ul>${bulletsHTML}</ul></div>
        <div class="panelNote">${note}</div>
      </div>
    `;
  }

  exerciseContent.innerHTML = exerciseHTML;

  // DEEP DIVE
  const deepDive = panelData.deepDive;
  let deepDiveHTML = "";

  if(deepDive && deepDive.variant === "text"){
    deepDiveHTML = `<div class="deepDiveText">
      <div class="panelH1">${safeTitle}</div>
      ${deepDive.paragraphs.map(p => `<p>${p}</p>`).join("")}
      <div class="panelNote">Tip: when panel is open we disable card nav so you never change card by accident.</div>
    </div>`;
  } else if(deepDive && deepDive.variant === "imageText"){
    deepDiveHTML = `<div class="deepDiveText">
      <div class="panelH1">${safeTitle}</div>
      <div class="deepDiveImage"><img loading="lazy" decoding="async" src="${deepDive.imageSrc}" alt="Deep Dive" /></div>
      ${deepDive.paragraphs.map(p => `<p>${p}</p>`).join("")}
      <div class="panelNote">Tip: when panel is open we disable card nav so you never change card by accident.</div>
    </div>`;
  } else if(deepDive && deepDive.variant === "longform"){
    const sectionsHTML = deepDive.sections.map(s => `
      <div class="longformSection">
        <h3>${s.h}</h3>
        <p>${s.p}</p>
      </div>
    `).join("");
    const noteHTML = deepDive.note ? `<div class="panelNote">${deepDive.note}</div>` : `<div class="panelNote">Quick test: squint. If you still "feel" where the image goes, the lines are doing their job.</div>`;

    deepDiveHTML = `
      <div class="longformHeader">
        <div class="eyebrow">${card.eyebrow}</div>
        <div class="panelH1">${safeTitle}</div>
        <div style="margin-top:8px; font-size:14px; color:rgba(255,255,255,0.60)">Long form · scroll inside panel</div>
      </div>
      <div class="longformScroll">
        ${sectionsHTML}
        ${noteHTML}
      </div>
    `;
  }

  deepDiveContent.innerHTML = deepDiveHTML;
}

function moveCard(dir){
  if(dir === "next") animateToIndex(currentIndex + 1, "next");
  if(dir === "prev") animateToIndex(currentIndex - 1, "prev");
}

// =============================
// PANELS (LAW: one panel at a time; no cross-open)
// =============================
function openPanel(side){
  if(Date.now() < panelCooldownUntil) return; // ignore opens during cooldown

  // LAW: if a panel is open and user tries to open the other -> just close to main
  if(activePanel !== null){
    closePanel();
    return;
  }

  activePanel = side;
  panelWrap.classList.add("open");
  panelWrap.classList.toggle("left", side === "left");
  panelWrap.classList.toggle("right", side === "right");

  document.getElementById("panelLeft").style.transform = "";
  document.getElementById("panelRight").style.transform = "";

  updatePanelContent();
}

function closePanel(){
  // cooldown: after closing, ignore horizontal open gestures briefly
  panelCooldownUntil = Date.now() + PANEL_COOLDOWN_MS;

  activePanel = null;

  // IMPORTANT: clear direction classes immediately
  panelWrap.classList.remove("left", "right");
  panelWrap.classList.remove("open");

  // Reset transforms
  document.getElementById("panelLeft").style.transform = "";
  document.getElementById("panelRight").style.transform = "";
}


// Single set of actions: inner card buttons. Document-level delegation.
document.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-action]");
  if(!btn) return;
  const action = btn.dataset.action;
  const lessonId = btn.dataset.lessonId;
  if(btn.disabled || btn.classList.contains("isDisabled")) return;
  if(action !== "exercise" && action !== "deepdive") return;

  if(activePanel !== null) closePanel();

  if(currentCourseCards && lessonId){
    const idx = currentCourseCards.findIndex(c => (c.id || "") === lessonId);
    if(idx >= 0){
      currentIndex = idx;
      updatePanelContent();
    }
  }
  if(action === "exercise") openPanel("left");
  if(action === "deepdive") openPanel("right");
});

// Prevent clicks inside panels from closing
document.getElementById("panelLeft").addEventListener("click", (e) => e.stopPropagation());
document.getElementById("panelRight").addEventListener("click", (e) => e.stopPropagation());

/* ===== Drag to close panels (pointer = mouse + touch) ===== */
function attachPanelDrag(panelEl, side /* "left" | "right" */){
  let dragging = false;
  let startX = 0;
  let lastX = 0;
  let lastT = 0;

  const sign = side === "left" ? -1 : 1; // closing direction

  panelEl.addEventListener("pointerdown", (e) => {
    if(activePanel !== side) return;
    // Do not start drag on interactive/header controls (keeps Close clickable)
    const target = e.target;
    if(target && target.closest && (
      target.closest(".panelClose") ||
      target.closest(".panelHeader") ||
      target.closest("button, a, input, textarea, select, label")
    )) return;
    dragging = true;
    startX = e.clientX;
    lastX = e.clientX;
    lastT = performance.now();
    panelEl.classList.add("panelDragActive");
    panelEl.setPointerCapture(e.pointerId);
  });

  panelEl.addEventListener("pointermove", (e) => {
    if(!dragging) return;
    const dx = e.clientX - startX;

    // Only allow dragging towards closing direction
    const allowed = sign === -1 ? Math.min(0, dx) : Math.max(0, dx);

    panelEl.style.transform = `translateX(${allowed}px)`;
    lastX = e.clientX;
    lastT = performance.now();
  });

  function endDrag(e){
    if(!dragging) return;
    dragging = false;

    panelEl.classList.remove("panelDragActive");

    const rect = panelEl.getBoundingClientRect();
    const width = rect.width || 520;
    const currentTx = parseFloat((panelEl.style.transform.match(/-?\d+(\.\d+)?/)||["0"])[0]) || 0;

    // Close if dragged enough (~22% of width)
    const closeThreshold = width * 0.22;

    if(Math.abs(currentTx) > closeThreshold){
      closePanel();
    } else {
      // snap back
      panelEl.style.transform = "";
    }
  }

  panelEl.addEventListener("pointerup", endDrag);
  panelEl.addEventListener("pointercancel", endDrag);
}

attachPanelDrag(document.getElementById("panelLeft"), "left");
attachPanelDrag(document.getElementById("panelRight"), "right");

// =============================
// GESTURE CONTROLLER (locked)
// =============================
function canNavigate(){
  return mode === "course" && activePanel === null && !isAnimating;
}

// WHEEL/TRACKPAD
let wheelAcc = 0;
let lastWheelTime = 0;

window.addEventListener("wheel", (e) => {
  if(inputMode !== InputMode.CARDS) return;

  const el = e.target;
  if(el && el.closest && el.closest(".panelContent")) return;

  e.preventDefault();

  // If panel open: do NOT navigate cards; allow only close via buttons/tap/drag
  if(activePanel !== null) return;
  if(isAnimating) return;

  const now = Date.now();
  if(now - lastWheelTime < 420){
    wheelAcc += e.deltaY;
    return;
  }

  const ax = Math.abs(e.deltaX);
  const ay = Math.abs(e.deltaY);

  // Horizontal wheel opens panels (optional but nice on trackpad)
  if(ax > ay * 1.2 && ax > 30){
    lastWheelTime = now;
    if(e.deltaX > 0) openPanel("right");
    else openPanel("left");
    return;
  }

  wheelAcc += e.deltaY;

  if(Math.abs(wheelAcc) >= 70){
    const dir = wheelAcc > 0 ? "next" : "prev";
    wheelAcc = 0;
    lastWheelTime = now;
    moveCard(dir);
  }
}, { passive: false });

// GESTURE LAYER: touch-only, NO capture på knappar – setPointerCapture endast efter intent
const SWIPE_THRESHOLD = 72;
const SWIPE_VELOCITY_MIN = 0.35;
const INTENT_THRESHOLD = 12;
const INTERACTIVE_SELECTOR = 'button, a, [role="button"], input, textarea, select, .panelHeader, .panelClose, #backBtn, #visualModeBtn';

const gestureLayer = document.getElementById("gestureLayer");
if(gestureLayer){
  let startX = 0, startY = 0, startT = 0, isGesture = false, didCapture = false, activePointerId = null;

  gestureLayer.addEventListener("pointerdown", (e) => {
    if(e.pointerType !== "touch") return;
    if(mode !== "course") return;
    const hit = document.elementFromPoint(e.clientX, e.clientY);
    if(hit && hit.closest && hit.closest(INTERACTIVE_SELECTOR)) return;
    if(e.target.closest && e.target.closest(INTERACTIVE_SELECTOR)) return;
    startX = e.clientX;
    startY = e.clientY;
    startT = Date.now();
    isGesture = false;
    didCapture = false;
    activePointerId = e.pointerId;
  }, { passive: true });

  gestureLayer.addEventListener("pointermove", (e) => {
    if(e.pointerType !== "touch") return;
    if(mode !== "course") return;
    if(activePointerId !== e.pointerId) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if(!isGesture && (Math.abs(dx) > INTENT_THRESHOLD || Math.abs(dy) > INTENT_THRESHOLD)){
      isGesture = true;
      if(!didCapture){ try{ gestureLayer.setPointerCapture(e.pointerId); didCapture = true; }catch(_){} }
    }
    if(isGesture) e.preventDefault();
  }, { passive: false });

  function release(pointerId){
    const id = pointerId != null ? pointerId : activePointerId;
    if(didCapture && id != null){ try{ gestureLayer.releasePointerCapture(id); }catch(_){} }
    didCapture = false;
    activePointerId = null;
  }

  gestureLayer.addEventListener("pointerup", (e) => {
    if(e.pointerType !== "touch") return;
    if(mode !== "course") return;
    try { release(e.pointerId); } finally {}
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    const dt = Date.now() - startT;
    const vx = dt > 0 ? dx / dt : 0;
    const ax = Math.abs(dx);
    const ay = Math.abs(dy);

    if(!isGesture || (ax < SWIPE_THRESHOLD && ay < SWIPE_THRESHOLD)) return;

    if(activePanel !== null){
      if(activePanel === "left" && dx < -SWIPE_THRESHOLD) closePanel();
      if(activePanel === "right" && dx > SWIPE_THRESHOLD) closePanel();
      return;
    }

    if(startY < 100 && dy > 60){
      onBackFromCourse();
      return;
    }

    if(!canNavigate()) return;
    if(Date.now() < panelCooldownUntil && Math.abs(dx) > Math.abs(dy) * 1.1) return;

    if(ax > ay * 1.1){
      if(Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(vx) > SWIPE_VELOCITY_MIN){
        if(dx < 0) openPanel("right");
        else openPanel("left");
      }
    } else {
      if(dy < 0) moveCard("next");
      else moveCard("prev");
    }
  }, { passive: true });

  gestureLayer.addEventListener("pointercancel", (e) => {
    try { release(e.pointerId); } finally {}
  }, { passive: true });
}

// KEYBOARD (desktop fallback)
window.addEventListener("keydown", (e) => {
  if(e.key === "Escape" || (e.key === "Backspace" && mode === "course")){
    if(activePanel !== null) closePanel();
    else if(mode === "course") onBackFromCourse();
    return;
  }
  if(!canNavigate()) return;

  if(e.key === "ArrowDown") moveCard("next");
  if(e.key === "ArrowUp") moveCard("prev");
  if(e.key === "ArrowLeft") openPanel("left");
  if(e.key === "ArrowRight") openPanel("right");
});

// =============================
// INIT
// =============================
document.body.style.overflow = "hidden";
renderPicker();
if(!applyStateFromHash()) showPickerView();

window.addEventListener("hashchange", () => {
  if(mode === "picker" && location.hash) applyStateFromHash();
});

</script>
